name: Extract PPTX Text

on:
  workflow_dispatch:
  push:
    paths:
      - "**.pptx"
      - "scripts/extract_pptx_text.py"

permissions:
  contents: write

jobs:
  extract-pptx-text:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-pptx

      - name: Extract text from PPTX files
        run: python scripts/extract_pptx_text.py

      - name: Commit extracted text
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add extracted-text/
            git commit -m "Extract PPTX text"
            git push
          else
            echo "No extracted text changes to commit."
          fi
